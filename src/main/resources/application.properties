# Porta configurável via variável de ambiente
server.port=${PORT:8088}
# Bind address (use :: to accept IPv6/IPv4 where supported)
server.address=${SERVER_ADDRESS:::}

# Credenciais padrão do admin (usadas pelo /auth/login)
spring.security.user.name=admin
spring.security.user.password=${PRACTICE_TEMP_PASSWORD:changeMe!}
spring.security.user.roles=ADMIN

# --- Sessão JWT (cookie) ---
# Propriedades internas mapeadas a partir de variáveis de ambiente
# Externas (env): APP_JWT_SECRET, APP_JWT_EXP_MIN, APP_SESSION_COOKIE_NAME, APP_SESSION_SECURE, APP_SESSION_SAMESITE, CORS_ALLOWED_ORIGINS
app.jwt.secret=${APP_JWT_SECRET:dev-secret-change-me}
app.jwt.exp-min=${APP_JWT_EXP_MIN:60}
app.session.cookie-name=${APP_SESSION_COOKIE_NAME:SESSION}
app.session.secure=${APP_SESSION_SECURE:false}
app.session.samesite=${APP_SESSION_SAMESITE:Lax}

# CORS (para cookies com credenciais, use origens explícitas; '*' desabilita credenciais)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# SpringDoc (UI e API docs por grupos)
springdoc.api-docs.enabled=true
springdoc.api-docs.groups.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.display-request-duration=true
app.openapi.internal-base-url=${APP_OPENAPI_INTERNAL_BASE_URL:}
praxis.ai.schemas.base-url=${APP_OPENAPI_INTERNAL_BASE_URL:}

# Actuator (default seguro): nao expor /env por padrao e nunca mostrar valores sensiveis.
# Para diagnostico local temporario, habilite explicitamente via env:
#   MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,info,env
#   MANAGEMENT_ENDPOINT_ENV_SHOW_VALUES=WHEN_AUTHORIZED
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
management.endpoint.env.show-values=${MANAGEMENT_ENDPOINT_ENV_SHOW_VALUES:NEVER}
management.endpoint.configprops.show-values=${MANAGEMENT_ENDPOINT_CONFIGPROPS_SHOW_VALUES:NEVER}
management.endpoint.env.keys-to-sanitize=${MANAGEMENT_ENDPOINT_ENV_KEYS_TO_SANITIZE:password,secret,key,token,credentials,vcap_services,sun.java.command,app.jwt.secret,spring.datasource.password,config.datasource.password,praxis.ai.openai.api-key,embedding.openai.api-key,praxis.ai.api-key-encryption-key}

# Praxis Metadata Starter — propriedades principais
praxis.query.by-ids.max=200
praxis.pagination.max-size=200
praxis.stats.enabled=${PRAXIS_STATS_ENABLED:true}
praxis.stats.max-buckets=${PRAXIS_STATS_MAX_BUCKETS:20}
praxis.stats.max-series-points=${PRAXIS_STATS_MAX_SERIES_POINTS:100}
# Contrato de range corporativo (strict-by-default; fallback escalar opcional)
praxis.filter.range.allow-scalar-payload=${PRAXIS_FILTER_RANGE_ALLOW_SCALAR_PAYLOAD:false}
praxis.filter.range.log-scalar-payload=${PRAXIS_FILTER_RANGE_LOG_SCALAR_PAYLOAD:true}

# Validação de uso de @ApiResource no baseline resource-oriented do metadata starter
praxis.openapi.validation.api-resource-required=WARN

# Rule Lab snapshot loader. The scope is an explicit host configuration and is
# never inferred from request headers or a caller-controlled principal payload.
praxis.rule-lab.snapshot.enabled=${PRAXIS_RULE_LAB_SNAPSHOT_ENABLED:false}
praxis.rule-lab.snapshot.tenant-id=${PRAXIS_RULE_LAB_TENANT_ID:desenv}
praxis.rule-lab.snapshot.environment=${PRAXIS_RULE_LAB_ENVIRONMENT:local}
praxis.rule-lab.snapshot.initial-delay-ms=${PRAXIS_RULE_LAB_INITIAL_DELAY_MS:5000}
praxis.rule-lab.snapshot.refresh-delay-ms=${PRAXIS_RULE_LAB_REFRESH_DELAY_MS:30000}
# Limite comum do dual-run QL-06. Timeout e falha sao isolados por lado e nunca
# convertem o candidato em autoridade nem habilitam persistencia/efeito.
praxis.rule-lab.shadow.timeout-ms=${PRAXIS_RULE_LAB_SHADOW_TIMEOUT_MS:250}

# Perfis: ajuste via env (ex.: SPRING_PROFILES_ACTIVE=dev|prod)
# Não definimos ativo aqui para facilitar deploy em serviços como Render.

# Segurança (geral): leitura pública opcional dos endpoints GET de /api/** e metadados (schemas/filters/options)
# Em ambiente corporativo, mantenha whitelist vazia por padrão e exponha apenas por env quando necessário.
app.security.read-open=${APP_SECURITY_READ_OPEN:false}
app.security.read-open.whitelist=${APP_SECURITY_READ_OPEN_WHITELIST:}
app.security.write-disabled=${APP_SECURITY_WRITE_DISABLED:false}
app.security.schemas-aggregator.enabled=${APP_SECURITY_SCHEMAS_AGGREGATOR_ENABLED:true}
app.security.demo-allow-bulk-actions=${APP_SECURITY_DEMO_ALLOW_BULK_ACTIONS:false}
app.security.config-origin-restriction.enabled=${APP_SECURITY_CONFIG_ORIGIN_RESTRICTION_ENABLED:true}
app.security.config-origin-restriction.allowed-origins=${APP_SECURITY_CONFIG_ORIGIN_RESTRICTION_ALLOWED_ORIGINS:https://praxisui-dev.web.app}
# Headers X-Forwarded-* so sao aceitos quando o peer imediato estiver nesta lista explicita.
# Aceita IPs exatos ou CIDR. Mantenha desabilitado quando a aplicacao estiver diretamente acessivel.
app.security.trusted-proxy.enabled=${APP_SECURITY_TRUSTED_PROXY_ENABLED:false}
app.security.trusted-proxy.addresses=${APP_SECURITY_TRUSTED_PROXY_ADDRESSES:}

# Rate limiting básico para endpoints públicos e login.
# Protecao minima na aplicacao; os defaults abaixo sao mais generosos para telas
# que disparam muitas chamadas em paralelo. Em producao, complemente com gateway/WAF.
app.rate-limit.enabled=${APP_RATE_LIMIT_ENABLED:true}
app.rate-limit.login.limit=${APP_RATE_LIMIT_LOGIN_LIMIT:10}
app.rate-limit.login.window-ms=${APP_RATE_LIMIT_LOGIN_WINDOW_MS:60000}
app.rate-limit.public-read.limit=${APP_RATE_LIMIT_PUBLIC_READ_LIMIT:600}
app.rate-limit.public-read.window-ms=${APP_RATE_LIMIT_PUBLIC_READ_WINDOW_MS:60000}
app.rate-limit.public-query.limit=${APP_RATE_LIMIT_PUBLIC_QUERY_LIMIT:240}
app.rate-limit.public-query.window-ms=${APP_RATE_LIMIT_PUBLIC_QUERY_WINDOW_MS:60000}
app.rate-limit.bulk-action.limit=${APP_RATE_LIMIT_BULK_ACTION_LIMIT:5}
app.rate-limit.bulk-action.window-ms=${APP_RATE_LIMIT_BULK_ACTION_WINDOW_MS:60000}
app.rate-limit.config.limit=${APP_RATE_LIMIT_CONFIG_LIMIT:240}
app.rate-limit.config.window-ms=${APP_RATE_LIMIT_CONFIG_WINDOW_MS:60000}

# DataSource primário (API)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# DataSource do RAG / config-store (pgvector)
config.datasource.url=${CONFIG_DATASOURCE_URL}
config.datasource.username=${CONFIG_DATASOURCE_USERNAME}
config.datasource.password=${CONFIG_DATASOURCE_PASSWORD}
config.datasource.driver-class-name=org.postgresql.Driver

# JPA / Flyway (aponta para o RAG/config-store)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.flyway.url=${config.datasource.url}
spring.flyway.user=${config.datasource.username}
spring.flyway.password=${config.datasource.password}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Footprint baseline para ambientes pequenos; o profile prod pode reduzir ainda mais.
server.tomcat.threads.max=${SERVER_TOMCAT_THREADS_MAX:32}
server.tomcat.max-connections=${SERVER_TOMCAT_MAX_CONNECTIONS:128}
server.tomcat.accept-count=${SERVER_TOMCAT_ACCEPT_COUNT:20}

# Spring AI OpenAI key for auto-configuration
praxis.ai.provider=${PRAXIS_AI_PROVIDER:openai}
praxis.ai.provider-fallback.enabled=${PRAXIS_AI_PROVIDER_FALLBACK_ENABLED:true}
praxis.ai.provider-fallback.candidates=${PRAXIS_AI_PROVIDER_FALLBACK_CANDIDATES:gemini,openai}
praxis.ai.timeout-seconds=${PRAXIS_AI_TIMEOUT_SECONDS:75}
spring.ai.openai.api-key=${PRAXIS_AI_OPENAI_API_KEY:${OPENAI_API_KEY:}}
spring.ai.openai.chat.options.model=${SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL:gpt-5-mini}
spring.ai.openai.embedding.options.model=${SPRING_AI_OPENAI_EMBEDDING_OPTIONS_MODEL:text-embedding-3-large}

# Spring AI embedding provider + Google GenAI (AI Studio) key
spring.ai.embedding.provider=${EMBEDDING_PROVIDER:openai}
spring.ai.google.genai.api-key=${PRAXIS_AI_GEMINI_API_KEY:${GEMINI_API_KEY:}}
spring.ai.google.genai.embedding.api-key=${PRAXIS_AI_GEMINI_API_KEY:${GEMINI_API_KEY:}}
spring.ai.google.genai.chat.options.model=${PRAXIS_AI_GEMINI_MODEL:gemini-2.5-flash}
praxis.ai.gemini.preview-enabled=${PRAXIS_AI_GEMINI_PREVIEW_ENABLED:false}
praxis.ai.gemini.prefer-genai-api=${PRAXIS_AI_GEMINI_PREFER_GENAI_API:true}
praxis.ai.gemini.fallback-models=${PRAXIS_AI_GEMINI_FALLBACK_MODELS:gemini-2.5-flash,gemini-2.0-flash}
praxis.ai.gemini.json-min-output-tokens=${PRAXIS_AI_GEMINI_JSON_MIN_OUTPUT_TOKENS:8192}
praxis.ai.gemini.retry.max-attempts=${PRAXIS_AI_GEMINI_RETRY_MAX_ATTEMPTS:3}
praxis.ai.gemini.retry.base-delay-ms=${PRAXIS_AI_GEMINI_RETRY_BASE_DELAY_MS:300}
praxis.ai.gemini.retry.jitter-percent=${PRAXIS_AI_GEMINI_RETRY_JITTER_PERCENT:30}
praxis.ai.gemini.breaker.threshold=${PRAXIS_AI_GEMINI_BREAKER_THRESHOLD:3}
praxis.ai.gemini.breaker.window-ms=${PRAXIS_AI_GEMINI_BREAKER_WINDOW_MS:30000}
praxis.ai.gemini.breaker.open-ms=${PRAXIS_AI_GEMINI_BREAKER_OPEN_MS:30000}
spring.autoconfigure.exclude=${SPRING_AUTOCONFIGURE_EXCLUDE:org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration,org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration,org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiEmbeddingConnectionAutoConfiguration,org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiTextEmbeddingAutoConfiguration}
praxis.ai.authoring.http-enabled=${PRAXIS_AI_AUTHORING_HTTP_ENABLED:true}
# Quickstart local defaults for governed AI authoring proof artifacts.
# Contracts are also bundled in praxis-config-starter so published hosts do not need a monorepo filesystem.
# Real hosts may still point these variables to their own versioned Praxis authoring corpus.
praxis.ai.authoring.contracts-dir=${PRAXIS_AI_AUTHORING_CONTRACTS_DIR:${user.dir}/../praxis-config-starter/docs/ai/agentic-authoring/contracts}
praxis.ai.authoring.artifacts-dir=${PRAXIS_AI_AUTHORING_ARTIFACTS_DIR:${user.dir}/../praxis-config-starter/docs/ai/agentic-authoring/proofs}
# Quickstart opt-in: este host demonstra planos ricos de referencia; o starter generico nao registra esse provider por padrao.
praxis.ai.authoring.reference-ui-composition-provider-enabled=${PRAXIS_AI_AUTHORING_REFERENCE_UI_COMPOSITION_PROVIDER_ENABLED:true}
