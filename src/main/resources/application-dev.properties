# --- Perfil: dev ---

# Bind local address and port for dev (IPv6/IPv4)
server.address=${SERVER_ADDRESS:::}
# Port already defaults to 8088 via base config; can override with PORT

# Datasource via env (defaults for local dev). For managed PostgreSQL, set envs below.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/praxis_demo?sslmode=disable}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}

# Em dev, nao tente migrar/alterar o schema - ele vem do dump
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never

# Sessao (dev): cookies sem Secure e SameSite=Lax por padrao
app.session.secure=${APP_SESSION_SECURE:false}
app.session.samesite=${APP_SESSION_SAMESITE:Lax}

# Seguranca (dev): desabilitar CSRF para facilitar o desenvolvimento local
app.security.csrf.disable=${APP_SECURITY_CSRF_DISABLE:true}

# Abrir leitura publica (dev)
app.security.read-open=${APP_SECURITY_READ_OPEN:true}

# AI authoring local (dev): o quickstart e o host operacional de referencia para
# browser-real sem principal corporativo. Em producao, o starter continua exigindo
# identidade resolvida server-side pelo perfil prod/default.
praxis.ai.security.corporate-mode=${PRAXIS_AI_SECURITY_CORPORATE_MODE:false}
praxis.ai.security.allow-header-identity-in-local=${PRAXIS_AI_SECURITY_ALLOW_HEADER_IDENTITY_IN_LOCAL:true}
praxis.ai.security.local-default-tenant=${PRAXIS_AI_SECURITY_LOCAL_DEFAULT_TENANT:desenv}
praxis.ai.security.local-default-user=${PRAXIS_AI_SECURITY_LOCAL_DEFAULT_USER:demo}
praxis.ai.security.local-default-environment=${PRAXIS_AI_SECURITY_LOCAL_DEFAULT_ENVIRONMENT:local}

# CORS/origin (dev): permitir origens explicitas para uso com cookies e config authoring.
# Defaults cobrem o host oficial local-first da UI (4003) e o fallback Angular CLI (4200).
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4003,http://127.0.0.1:4003,http://localhost:4200,http://127.0.0.1:4200}
app.security.config-origin-restriction.allowed-origins=${APP_SECURITY_CONFIG_ORIGIN_RESTRICTION_ALLOWED_ORIGINS:http://localhost:4003,http://127.0.0.1:4003,http://localhost:4200,http://127.0.0.1:4200}

# Actuator (dev): manter defaults seguros; use override temporario via env se precisar diagnosticar.
management.endpoint.env.show-values=${MANAGEMENT_ENDPOINT_ENV_SHOW_VALUES:NEVER}
