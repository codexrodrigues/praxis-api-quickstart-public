# --- Perfil: prod ---

# Expect environment variables provided by the platform (e.g., Render):
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:3}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:0}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:120000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:600000}
spring.datasource.hikari.keepalive-time=${DB_POOL_KEEPALIVE_MS:0}

config.datasource.hikari.maximum-pool-size=${CONFIG_DB_POOL_SIZE:2}
config.datasource.hikari.minimum-idle=${CONFIG_DB_POOL_MIN_IDLE:0}
config.datasource.hikari.idle-timeout=${CONFIG_DB_POOL_IDLE_TIMEOUT_MS:120000}
config.datasource.hikari.max-lifetime=${CONFIG_DB_POOL_MAX_LIFETIME_MS:600000}
config.datasource.hikari.keepalive-time=${CONFIG_DB_POOL_KEEPALIVE_MS:0}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.sql.init.mode=never

# Sessão (prod): cookies Secure e, se domínio diferente, SameSite=None
app.session.secure=${APP_SESSION_SECURE:true}
app.session.samesite=${APP_SESSION_SAMESITE:None}

# CORS (prod): defina origens explícitas (não use *)
# Ex.: CORS_ALLOWED_ORIGINS=https://minha-ui.exemplo.com
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}
