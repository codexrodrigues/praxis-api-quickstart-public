name: Domain Catalog Runtime Smoke

on:
  workflow_run:
    workflows: [Publish Public Release]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      backend_url:
        description: Runtime base URL to validate
        required: true
        default: https://praxis-api-quickstart.onrender.com
      tenant_id:
        description: Tenant header
        required: true
        default: default
      environment:
        description: Environment header
        required: true
        default: dev
      resource_keys:
        description: Resource keys used by context and ingest resilience smokes
        required: true
        default: human-resources.funcionarios operations.missoes
      run_ingest_resilience:
        description: Run idempotent ingest resilience smoke
        required: true
        default: 'true'
      max_idempotent_ingest_ms:
        description: Maximum elapsed time for the repeated stable ingest
        required: true
        default: '10000'
      sync_current_releases:
        description: Force ingest the current /schemas/domain releases before read-only validation
        required: true
        default: 'true'
      wait_for_runtime_rollout:
        description: Wait for the published runtime build timestamp before syncing releases
        required: true
        default: 'true'
  schedule:
    - cron: '17 9 * * *'

concurrency:
  group: domain-catalog-runtime-smoke-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  runtime-smoke:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      BACKEND_URL: ${{ inputs.backend_url || 'https://praxis-api-quickstart.onrender.com' }}
      TENANT_ID: ${{ inputs.tenant_id || 'default' }}
      ENVIRONMENT: ${{ inputs.environment || 'dev' }}
      ORIGIN: https://praxisui-dev.web.app
      RESOURCE_KEYS: ${{ inputs.resource_keys || 'human-resources.funcionarios operations.missoes' }}
      RUN_INGEST_RESILIENCE: ${{ inputs.run_ingest_resilience || 'true' }}
      MAX_IDEMPOTENT_INGEST_MS: ${{ inputs.max_idempotent_ingest_ms || '10000' }}
      SYNC_CURRENT_RELEASES: ${{ inputs.sync_current_releases || 'true' }}
      WAIT_FOR_RUNTIME_ROLLOUT: ${{ inputs.wait_for_runtime_rollout || 'true' }}
      EXPECTED_BUILD_AFTER: ${{ github.event.workflow_run.created_at || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Classify runtime rollout expectation
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${WAIT_FOR_RUNTIME_ROLLOUT}" != "true" || -z "${EXPECTED_BUILD_AFTER}" ]]; then
            echo "RUNTIME_ROLLOUT_REQUIRED=false" >> "${GITHUB_ENV}"
            echo "Runtime rollout wait disabled by input or non-workflow_run event."
            exit 0
          fi

          if ! git rev-parse HEAD^ >/dev/null 2>&1; then
            echo "RUNTIME_ROLLOUT_REQUIRED=true" >> "${GITHUB_ENV}"
            echo "Previous commit unavailable; keeping rollout wait enabled."
            exit 0
          fi

          changed_files="$(git diff --name-only HEAD^ HEAD)"
          printf 'Changed files for rollout classification:\n%s\n' "${changed_files}"

          runtime_files="$(printf '%s\n' "${changed_files}" | grep -E '^(src/main/|pom\.xml$|mvnw$|\.mvn/|system\.properties$|Dockerfile$|render\.yaml$)' || true)"
          if [[ -n "${runtime_files}" ]]; then
            echo "RUNTIME_ROLLOUT_REQUIRED=true" >> "${GITHUB_ENV}"
            printf 'Runtime rollout required by:\n%s\n' "${runtime_files}"
          else
            echo "RUNTIME_ROLLOUT_REQUIRED=false" >> "${GITHUB_ENV}"
            echo "No runtime-impacting files changed; skipping rollout timestamp wait."
          fi

      - name: Install runtime smoke dependencies
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi

      - name: Validate smoke script syntax
        shell: bash
        run: |
          bash -n scripts/upload-domain-catalog.sh
          bash -n scripts/upload-domain-catalog-batch.sh
          bash -n scripts/ensure-domain-catalog-context.sh
          bash -n scripts/verify-domain-catalog-context.sh
          bash -n scripts/verify-domain-catalog-ingest-resilience.sh
          bash -n scripts/verify-domain-catalog-authoring-runtime.sh
          bash -n scripts/verify-procurement-analytics-runtime.sh
          bash -n scripts/verify-risk-intelligence-runtime.sh
          bash -n scripts/verify-assets-runtime.sh
          bash -n scripts/verify-human-resources-runtime.sh
          bash -n scripts/verify-operations-runtime.sh
          bash -n scripts/verify-cockpit-inventory-doc.sh
          bash -n scripts/verify-cockpit-action-contracts.sh
          bash -n scripts/verify-cockpit-surface-contracts.sh
          bash -n scripts/verify-cockpit-related-resource-contracts.sh
          bash -n scripts/verify-cockpit-analytics-contracts.sh
          bash -n scripts/verify-cockpit-option-source-contracts.sh
          bash -n scripts/verify-cockpit-structural-ui-contracts.sh

      - name: Wait for published runtime rollout
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${WAIT_FOR_RUNTIME_ROLLOUT}" != "true" || -z "${EXPECTED_BUILD_AFTER}" || "${RUNTIME_ROLLOUT_REQUIRED}" != "true" ]]; then
            echo "Skipping runtime rollout wait."
            exit 0
          fi

          python3 - <<'PY'
          import datetime as dt
          import json
          import os
          import time
          import urllib.request

          backend_url = os.environ["BACKEND_URL"].rstrip("/")
          expected = dt.datetime.fromisoformat(os.environ["EXPECTED_BUILD_AFTER"].replace("Z", "+00:00"))
          deadline = time.time() + int(os.environ.get("RUNTIME_ROLLOUT_WAIT_SECONDS", "900"))
          last_seen = None

          while time.time() < deadline:
              try:
                  with urllib.request.urlopen(f"{backend_url}/actuator/health", timeout=20) as response:
                      health = json.load(response)
                  with urllib.request.urlopen(f"{backend_url}/actuator/info", timeout=20) as response:
                      info = json.load(response)

                  build_time_raw = info.get("build", {}).get("time")
                  last_seen = {"health": health, "buildTime": build_time_raw}
                  if health.get("status") == "UP" and build_time_raw:
                      build_time = dt.datetime.fromisoformat(build_time_raw.replace("Z", "+00:00"))
                      if build_time >= expected:
                          print(json.dumps({"status": "runtime-rollout-ready", "expectedAfter": expected.isoformat(), "buildTime": build_time.isoformat()}))
                          raise SystemExit(0)
              except Exception as error:
                  last_seen = {"error": str(error)}

              print(json.dumps({"status": "waiting-runtime-rollout", "expectedAfter": expected.isoformat(), "lastSeen": last_seen}))
              time.sleep(20)

          print(json.dumps({
              "status": "runtime-rollout-not-observed",
              "expectedAfter": expected.isoformat(),
              "lastSeen": last_seen,
              "nextStep": "syncing the catalog exposed by the currently published runtime"
          }))
          PY

      - name: Sync current domain catalog releases
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${SYNC_CURRENT_RELEASES}" != "true" ]]; then
            echo "Skipping current release sync."
            exit 0
          fi

          FORCE_INGEST=true scripts/upload-domain-catalog-batch.sh

      - name: Verify persisted domain catalog context
        shell: bash
        run: scripts/verify-domain-catalog-context.sh

      - name: Run idempotent ingest resilience smoke
        shell: bash
        run: |
          if [[ "${RUN_INGEST_RESILIENCE}" != "true" ]]; then
            echo "Skipping ingest resilience smoke."
            exit 0
          fi
          scripts/verify-domain-catalog-ingest-resilience.sh

      - name: Run domain catalog runtime authoring smoke
        shell: bash
        run: scripts/verify-domain-catalog-authoring-runtime.sh

      - name: Run procurement analytics runtime smoke
        shell: bash
        run: scripts/verify-procurement-analytics-runtime.sh

      - name: Run risk intelligence runtime smoke
        shell: bash
        run: scripts/verify-risk-intelligence-runtime.sh

      - name: Run assets runtime smoke
        shell: bash
        run: scripts/verify-assets-runtime.sh

      - name: Run human resources runtime smoke
        shell: bash
        run: scripts/verify-human-resources-runtime.sh

      - name: Run operations runtime smoke
        shell: bash
        run: scripts/verify-operations-runtime.sh

      - name: Verify cockpit inventory documentation
        shell: bash
        run: scripts/verify-cockpit-inventory-doc.sh

      - name: Verify cockpit action contracts
        shell: bash
        run: scripts/verify-cockpit-action-contracts.sh

      - name: Verify cockpit surface contracts
        shell: bash
        run: scripts/verify-cockpit-surface-contracts.sh

      - name: Verify cockpit related resource contracts
        shell: bash
        run: scripts/verify-cockpit-related-resource-contracts.sh

      - name: Verify cockpit analytics contracts
        shell: bash
        run: scripts/verify-cockpit-analytics-contracts.sh

      - name: Verify cockpit option source contracts
        shell: bash
        run: scripts/verify-cockpit-option-source-contracts.sh

      - name: Verify cockpit structural UI contracts
        shell: bash
        run: scripts/verify-cockpit-structural-ui-contracts.sh
